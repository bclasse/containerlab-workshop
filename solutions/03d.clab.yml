name: 03-startup

topology:
  defaults:
    kind: nokia_srlinux
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:25.10.1

  nodes:
    leaf1:
      startup-config: configs/leaf1.json
      type: ixr-d2l
    leaf2:
      startup-config: configs/leaf2.cfg
      type: ixr-d2l
    client1:
      kind: linux
      image: ghcr.io/srl-labs/network-multitool:latest
      exec:
        - ip address add 172.17.0.1/24 dev eth1
        - ip -6 address add 2002::172:17:0:1/96 dev eth1

  links:
    - endpoints: [ "leaf1:e1-1", "leaf2:e1-1" ]
    - endpoints: [ "client1:eth1", "leaf1:e1-2" ]
