name: 02-vscode

topology:
  defaults:
    kind: nokia_srlinux
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:25.10.1
      type: ixr-d3l
  nodes:
    leaf1:
    leaf2:
      image: ghcr.io/nokia/srlinux:24.10.1
    srl1:
      kind: nokia_srlinux
      type: ixrd1
      image: ghcr.io/nokia/srlinux:latest
      enforce-startup-config: true

  links:
    - endpoints: [ "leaf1:e1-1", "leaf2:e1-1" ]
    - endpoints: [ "srl1:e1-1", "leaf1:e1-2" ]
