# uplink interfaces
set / interface ethernet-1/1
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 0
set / interface ethernet-1/1 subinterface 0 admin-state enable
set / interface ethernet-1/1 subinterface 0 ip-mtu 9000
set / interface ethernet-1/1 subinterface 0 ipv4
set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
set / interface ethernet-1/1 subinterface 0 ipv4 address 192.168.11.1/31

# system interface configuration
set / interface system0
set / interface system0 admin-state enable
set / interface system0 subinterface 0
set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 10.0.1.2/32

# associating interfaces with net-ins default
set / network-instance default
set / network-instance default ip-forwarding
set / network-instance default ip-forwarding receive-ipv4-check false
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface system0.0

set / network-instance default protocols bgp
set / network-instance default protocols bgp admin-state enable
set / network-instance default protocols bgp autonomous-system 100
set / network-instance default protocols bgp router-id 10.0.1.2
set / network-instance default protocols bgp group iBGP
set / network-instance default protocols bgp group iBGP afi-safi ipv4-unicast
set / network-instance default protocols bgp group iBGP afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp afi-safi ipv4-unicast
set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp neighbor 192.168.11.0
set / network-instance default protocols bgp neighbor 192.168.11.0 admin-state enable
set / network-instance default protocols bgp neighbor 192.168.11.0 peer-as 100
set / network-instance default protocols bgp neighbor 192.168.11.0 peer-group iBGP
set / network-instance default protocols bgp neighbor 192.168.11.0 transport local-address 192.168.11.1

set / routing-policy prefix-set local
set / routing-policy prefix-set local prefix 10.0.1.0/24 mask-length-range 24..32
set / routing-policy policy export-local
set / routing-policy policy export-local statement 10
set / routing-policy policy export-local statement 10 match
set / routing-policy policy export-local statement 10 match prefix prefix-set local
set / routing-policy policy export-local statement 10 action
set / routing-policy policy export-local statement 10 action policy-result accept
set / network-instance default protocols bgp group iBGP export-policy [ export-local ]
